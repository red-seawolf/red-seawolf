name: Update lotto history data

# Keeps lotto-history/data/draws.{json,js} in sync with real Thai Government
# Lottery results (drawn on the 1st and 16th of each month, occasionally
# moved). Runs daily — the fetch is one cheap API page check when there is
# nothing new, and it only commits when new draws actually landed.
on:
  schedule:
    - cron: "30 10 * * *" # 17:30 Asia/Bangkok, after draw results are published
  workflow_dispatch:
    inputs:
      full_sync:
        description: "Refetch the entire archive (ignore existing data)"
        type: boolean
        default: false
  push:
    # Also runs when the pipeline itself changes — including the branch push
    # that first introduces it, which seeds the real dataset. The branches
    # filter keeps tag pushes out (they would check out a detached HEAD).
    branches: ["**"]
    paths:
      - "scripts/fetch-lotto-data.mjs"
      - ".github/workflows/update-lotto-data.yml"

permissions:
  contents: write
  actions: write # to kick the Pages deploy after a data commit

concurrency:
  group: lotto-data-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch latest draw data
        env:
          FULL_SYNC: ${{ inputs.full_sync && '1' || '' }}
        run: node scripts/fetch-lotto-data.mjs

      - name: Commit and push if changed
        id: commit
        run: |
          if git diff --quiet -- lotto-history/data; then
            echo "No data changes."
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lotto-history/data
          git commit -m "Update lotto history data ($(date -u +%F))"
          # Rebase-and-retry in case the branch advanced while we were fetching.
          for i in 1 2 3; do
            if git push; then
              echo "pushed=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            git pull --rebase
          done
          git push
          echo "pushed=true" >> "$GITHUB_OUTPUT"

      # Pushes made with GITHUB_TOKEN never trigger other workflows, so the
      # Pages deploy must be kicked explicitly for the data to go live.
      - name: Trigger Pages deploy
        if: steps.commit.outputs.pushed == 'true' && github.ref_name == github.event.repository.default_branch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run deploy-pages.yml --repo "$GITHUB_REPOSITORY" --ref "${{ github.ref_name }}" \
            || echo "Pages deploy dispatch failed (non-fatal — branch-based Pages deploys on its own)"
